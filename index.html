<!DOCTYPE html>
<!--
  MET2026 영수증 경비정산 — v1.4 (2026-07-19)
  변경 이력:
    v1.0 CLOVA OCR + google.script.run 기반 초기 버전
    v1.1 사역팀명 드롭다운(+직접입력), 구매내역 필드 추가, 전체내역 탭 + 엑셀저장
    v1.2 GitHub Pages 배포용 fetch()/doPost 방식으로 전환, OCR.space로 교체,
         전용 별도 스프레드시트 자동 생성
    v1.3 사진 리사이즈/압축 후 OCR 전송, 상호명/금액 추정 로직 개선
         (관리번호 오인식 방지, 콤마·마침표 구분 인식)
    v1.4 "[고객용]" 같은 대괄호 태그성 문구를 상호명으로 잘못 고르는 문제 수정
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MET2026 영수증 경비정산</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Malgun Gothic", sans-serif;
    margin: 0; padding: 16px; background: #f4f5f7; color: #222;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #777; margin-bottom: 16px; }
  .card {
    background: #fff; border-radius: 12px; padding: 16px;
    margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  label { display: block; font-size: 13px; color: #555; margin: 10px 0 4px; }
  input, select {
    width: 100%; padding: 10px; font-size: 15px;
    border: 1px solid #ddd; border-radius: 8px; background: #fafafa;
  }
  .capture-btn {
    display: block; width: 100%; padding: 14px; text-align: center;
    background: #2d6cdf; color: #fff; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 600; margin-bottom: 10px;
  }
  #preview { width: 100%; border-radius: 10px; margin-bottom: 10px; display: none; }
  .save-btn {
    width: 100%; padding: 14px; background: #1a9c5b; color: #fff;
    border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
  }
  .save-btn:disabled { background: #aaa; }
  .status { font-size: 13px; margin-top: 8px; text-align: center; color: #555; }
  .total-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 15px; font-weight: 600; margin-bottom: 8px;
  }
  .total-bar span.amt { color: #2d6cdf; font-size: 18px; }
  .item {
    display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee;
    align-items: center;
  }
  .item:last-child { border-bottom: none; }
  .item img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; background: #eee; }
  .item .info { flex: 1; font-size: 14px; }
  .item .info .vendor { font-weight: 600; }
  .item .info .meta { color: #888; font-size: 12px; }
  .item .amt { font-weight: 600; color: #222; }
  .del { color: #d33; font-size: 12px; border: none; background: none; padding: 4px; }
  .name-row { display:flex; gap:8px; margin-bottom:14px; }
  .name-row input { flex:1; }
  .name-row button { padding:0 14px; border:none; border-radius:8px; background:#555; color:#fff; }
  .tabs { display:flex; gap:8px; margin-bottom:14px; }
  .tab-btn {
    flex:1; padding:10px; border:none; border-radius:8px; background:#e6e8eb;
    color:#555; font-size:14px; font-weight:600;
  }
  .tab-btn.active { background:#2d6cdf; color:#fff; }
  .table-wrap { overflow-x:auto; -webkit-overflow-scrolling: touch; }
  table.receipt-table { border-collapse:collapse; width:100%; font-size:12px; white-space:nowrap; }
  table.receipt-table th, table.receipt-table td {
    border:1px solid #eee; padding:6px 8px; text-align:left;
  }
  table.receipt-table th { background:#f7f8fa; position:sticky; top:0; }
  table.receipt-table td.amt-col { text-align:right; font-weight:600; }
  table.receipt-table img.thumb { width:34px; height:34px; object-fit:cover; border-radius:4px; }
  .refresh-btn {
    padding:8px 12px; border:none; border-radius:8px; background:#555; color:#fff; font-size:12px;
  }
</style>
</head>
<body>

<h1>MET2026 블레싱 삼척 영수증 정산</h1>
<div class="sub">영수증 사진을 찍으면 자동으로 인식해서 기록해 드려요. <span style="color:#bbb">v1.4</span></div>

<div class="tabs">
  <button class="tab-btn active" id="tabBtnRegister" onclick="switchTab('register')">등록하기</button>
  <button class="tab-btn" id="tabBtnAll" onclick="switchTab('all')">전체내역</button>
</div>

<div id="panelRegister">
<div class="card">
  <div class="name-row">
    <input id="submitterName" placeholder="제출자 이름" />
    <button onclick="saveName()">이름 저장</button>
  </div>

  <label>사역팀명</label>
  <select id="teamName" onchange="onTeamChange()">
    <option value="">-- 사역팀 선택 --</option>
    <option value="전도팀">전도팀</option>
    <option value="장금이팀">장금이팀</option>
    <option value="장수사진/메이크업팀">장수사진/메이크업팀</option>
    <option value="맛사지팀">맛사지팀</option>
    <option value="간식팀">간식팀</option>
    <option value="어린이(청소년)팀">어린이(청소년)팀</option>
    <option value="시설지원팀">시설지원팀</option>
    <option value="바자회팀">바자회팀</option>
    <option value="중보기도팀">중보기도팀</option>
    <option value="의료팀">의료팀</option>
    <option value="이미용팀">이미용팀</option>
    <option value="__custom__">기타 (직접 입력)</option>
  </select>
  <input id="teamNameCustom" placeholder="사역팀명을 입력하세요" style="display:none; margin-top:6px">


  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none"
         onchange="onFileSelected(event)">
  <button class="capture-btn" onclick="document.getElementById('fileInput').click()">
    📷 영수증 사진 찍기 / 선택하기
  </button>

  <img id="preview" />

  <div id="editForm" style="display:none">
    <label>상호명</label>
    <input id="vendor" placeholder="예: 삼척휴게소">
    <label>금액 (원)</label>
    <input id="amount" type="number" placeholder="예: 15000">
    <label>사용일자</label>
    <input id="usedDate" type="date">
    <label>구매내역</label>
    <input id="purchaseDetail" placeholder="예: 저녁 식사 15인분, 버스 주유비">
    <label>메모 (선택)</label>
    <input id="memo" placeholder="추가로 남길 내용이 있으면 입력">
    <button class="save-btn" id="saveBtn" onclick="saveReceipt()" style="margin-top:14px">저장하기</button>
  </div>

  <div class="status" id="status"></div>
</div>

<div class="card">
  <div class="total-bar">
    <span>내 정산 합계</span>
    <span class="amt" id="totalAmt">0원</span>
  </div>
  <div id="list"></div>
</div>
</div>

<div id="panelAll" style="display:none">
  <div class="card">
    <div class="total-bar">
      <span>전체 정산 합계</span>
      <span class="amt" id="totalAmtAll">0원</span>
      <button class="refresh-btn" onclick="loadAllList()">새로고침</button>
      <button class="refresh-btn" style="background:#1d6f42" onclick="exportAllExcel()">📥 엑셀저장</button>
    </div>
    <div class="table-wrap">
      <table class="receipt-table">
        <thead>
          <tr>
            <th>사용일자</th><th>제출자</th><th>사역팀명</th><th>상호명</th>
            <th>금액</th><th>구매내역</th><th>사진</th><th>메모</th>
          </tr>
        </thead>
        <tbody id="allTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let currentBase64 = null;
let currentMime = null;
let allReceiptsCache = [];

var WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzvO5lEtq4xEmSrOy3oAR84M8_-hdG8SOm8xoWWCR65PRA2muH6BDvtgQjodnO9PfRq0g/exec';

function callApi(action, params) {
  return fetch(WEBAPP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(Object.assign({ action: action }, params || {}))
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res.success) throw new Error(res.error || '알 수 없는 오류');
      return res.data;
    });
}

function switchTab(tab) {
  const isReg = tab === 'register';
  document.getElementById('panelRegister').style.display = isReg ? 'block' : 'none';
  document.getElementById('panelAll').style.display = isReg ? 'none' : 'block';
  document.getElementById('tabBtnRegister').classList.toggle('active', isReg);
  document.getElementById('tabBtnAll').classList.toggle('active', !isReg);
  if (!isReg) loadAllList();
}

function loadAllList() {
  document.getElementById('allTableBody').innerHTML = '<tr><td colspan="8">불러오는 중...</td></tr>';
  callApi('getAllReceipts', {})
    .then(renderAllList)
    .catch(function(err) {
      document.getElementById('allTableBody').innerHTML =
        '<tr><td colspan="8">조회 실패: ' + err.message + '</td></tr>';
    });
}

function renderAllList(items) {
  allReceiptsCache = items;
  const body = document.getElementById('allTableBody');
  body.innerHTML = '';
  let total = 0;
  if (!items.length) {
    body.innerHTML = '<tr><td colspan="8">등록된 영수증이 없습니다.</td></tr>';
  }
  items.forEach(function(it) {
    total += Number(it.amount) || 0;
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + (it.usedDate || '') + '</td>' +
      '<td>' + (it.submitter || '') + '</td>' +
      '<td>' + (it.team || '') + '</td>' +
      '<td>' + (it.vendor || '') + '</td>' +
      '<td class="amt-col">' + Number(it.amount).toLocaleString() + '원</td>' +
      '<td>' + (it.purchaseDetail || '') + '</td>' +
      '<td>' + (it.imageUrl ? '<img class="thumb" src="' + it.imageUrl + '">' : '') + '</td>' +
      '<td>' + (it.memo || '') + '</td>';
    body.appendChild(tr);
  });
  document.getElementById('totalAmtAll').textContent = total.toLocaleString() + '원';
}

function exportAllExcel() {
  if (!allReceiptsCache.length) { alert('내보낼 데이터가 없습니다.'); return; }
  var headers = ['사용일자', '제출자', '사역팀명', '상호명', '금액', '구매내역', '이미지링크', '메모'];
  var rows = allReceiptsCache.map(function(it) {
    return {
      '사용일자': it.usedDate || '',
      '제출자': it.submitter || '',
      '사역팀명': it.team || '',
      '상호명': it.vendor || '',
      '금액': Number(it.amount) || 0,
      '구매내역': it.purchaseDetail || '',
      '이미지링크': it.imageUrl || '',
      '메모': it.memo || ''
    };
  });
  var total = allReceiptsCache.reduce(function(sum, it) { return sum + (Number(it.amount) || 0); }, 0);
  rows.push({ '사용일자': '', '제출자': '', '사역팀명': '', '상호명': '합계', '금액': total, '구매내역': '', '이미지링크': '', '메모': '' });

  var ws = XLSX.utils.json_to_sheet(rows, { header: headers });
  ws['!cols'] = [{wch:12},{wch:10},{wch:14},{wch:16},{wch:10},{wch:24},{wch:30},{wch:20}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '영수증전체내역');
  var ts = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb, 'MET2026_영수증전체내역_' + ts + '.xlsx');
}

function onTeamChange() {
  const sel = document.getElementById('teamName').value;
  const custom = document.getElementById('teamNameCustom');
  custom.style.display = (sel === '__custom__') ? 'block' : 'none';
  if (sel !== '__custom__') custom.value = '';
}

function getTeamValue() {
  const sel = document.getElementById('teamName').value;
  if (sel === '__custom__') return document.getElementById('teamNameCustom').value.trim();
  return sel;
}

function saveName() {
  const n = document.getElementById('submitterName').value.trim();
  const t = getTeamValue();
  if (!n) return;
  localStorage.setItem('met2026_submitter', n);
  if (t) localStorage.setItem('met2026_team', t);
  setStatus('이름/사역팀명이 저장되었습니다: ' + n + (t ? ' (' + t + ')' : ''));
}

function loadName() {
  const n = localStorage.getItem('met2026_submitter');
  const t = localStorage.getItem('met2026_team');
  if (n) document.getElementById('submitterName').value = n;
  if (t) {
    const sel = document.getElementById('teamName');
    const hasOption = Array.from(sel.options).some(function(o) { return o.value === t; });
    if (hasOption) {
      sel.value = t;
    } else {
      sel.value = '__custom__';
      document.getElementById('teamNameCustom').style.display = 'block';
      document.getElementById('teamNameCustom').value = t;
    }
  }
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function onFileSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  currentMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = function() {
    const preview = document.getElementById('preview');
    preview.src = reader.result;
    preview.style.display = 'block';
    document.getElementById('editForm').style.display = 'none';
    setStatus('사진 준비 중입니다...');

    resizeImage(reader.result, 1600).then(function(resizedDataUrl) {
      currentBase64 = resizedDataUrl.split(',')[1];
      currentMime = 'image/jpeg';
      setStatus('OCR 인식 중입니다...');
      return runOcr(resizedDataUrl);
    })
      .then(onOcrResult)
      .catch(function(err) {
        setStatus('OCR 인식 실패: ' + err.message + ' (직접 입력해 주세요)');
        document.getElementById('editForm').style.display = 'block';
      });
  };
  reader.readAsDataURL(file);
}

// 긴 변 기준 maxSize 픽셀로 축소 + JPEG 압축 (OCR.space 무료 키 용량 제한 대응)
function resizeImage(dataUrl, maxSize) {
  return new Promise(function(resolve, reject) {
    const img = new Image();
    img.onload = function() {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        const ratio = Math.min(maxSize / w, maxSize / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = function() { reject(new Error('이미지를 불러오지 못했습니다')); };
    img.src = dataUrl;
  });
}

// OCR.space: 브라우저 직접 호출 방식 — 서버 연결 불필요
var OCR_SPACE_KEY = 'K83219514388957';

async function runOcr(dataUrl) {
  const formData = new FormData();
  formData.append('base64Image', dataUrl);
  formData.append('apikey', OCR_SPACE_KEY);
  formData.append('language', 'kor');
  formData.append('OCREngine', '2');
  formData.append('scale', 'true');
  formData.append('detectOrientation', 'true');

  const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: formData });
  const json = await res.json();
  if (json.IsErroredOnProcessing) throw new Error('OCR 처리 실패: ' + (json.ErrorMessage || '알 수 없는 오류'));
  const text = ((json.ParsedResults || [])[0] || {}).ParsedText || '';
  if (!text.trim()) throw new Error('텍스트를 인식하지 못했습니다 (사진을 더 밝고 정면에서 찍어보세요)');

  return parseReceiptText(text);
}

// OCR 원문 → 상호명/금액/날짜 추정
function parseReceiptText(text) {
  const lines = text.split(/\r?\n/).map(function(l) { return l.trim(); }).filter(Boolean);

  const amount = guessAmount(lines);

  // 날짜: YYYY-MM-DD, YYYY.MM.DD, YY.MM.DD 등
  const fullText = lines.join(' ');
  let date = '';
  const datePatterns = [/(20\d{2})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/, /(\d{2})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/];
  for (let i = 0; i < datePatterns.length; i++) {
    const m = fullText.match(datePatterns[i]);
    if (m) {
      const y = m[1].length === 2 ? '20' + m[1] : m[1];
      date = y + '-' + ('0' + m[2]).slice(-2) + '-' + ('0' + m[3]).slice(-2);
      break;
    }
  }

  const vendor = guessVendor(lines);

  return { vendor: vendor, amount: amount, date: date, rawText: text };
}

// 금액 추정: "합계/총액/카드매출" 등 키워드가 있는 줄을 우선하고,
// 승인번호·카드번호·영수증번호처럼 자릿수가 아주 긴 숫자(관리번호)는 후보에서 제외
function guessAmount(lines) {
  const keywordRe = /(합계|총액|총금액|받을금액|결제금액|판매금액|카드매출)/;
  const candidates = [];

  lines.forEach(function(line) {
    const compact = line.replace(/\s+/g, '');
    // 관리번호/승인번호처럼 구분자 없이 9자리 넘는 숫자가 있는 줄은 통째로 제외
    if (/\d{9,}/.test(compact.replace(/[,\.]/g, ''))) return;

    const matches = compact.match(/[0-9][0-9,\.]{1,}/g) || [];
    matches.forEach(function(raw) {
      const hasSeparator = /[,\.]/.test(raw);
      const cleaned = raw.replace(/[,\.]/g, '');
      const num = parseInt(cleaned, 10);
      if (isNaN(num) || num <= 0 || cleaned.length > 9) return;
      let priority = 0;
      if (keywordRe.test(compact)) priority += 2;
      if (hasSeparator) priority += 1;
      candidates.push({ num: num, priority: priority });
    });
  });

  if (!candidates.length) return '';
  candidates.sort(function(a, b) { return a.priority !== b.priority ? b.priority - a.priority : b.num - a.num; });
  return candidates[0].num;
}

// 상호명 추정: 상단 몇 줄 중 "영수증/전표/카드/사업자/테이블/승인" 같은
// 영수증 안내 문구가 아닌, 한글/영문 비중이 높은 줄
function guessVendor(lines) {
  const excludeRe = /(영수증|전표|카드|매출|신용|사업자|대표자|TEL|테이블|판매시간|판매사원|영수번호|승인|품명|단가|수량|공급가|부가세|포장|합계|고객용|관리용|보관용|공급자용)/i;
  const bracketTagRe = /^\[[^\]]{1,10}\]$/; // "[고객용]"처럼 대괄호로만 감싼 짧은 태그
  for (let i = 0; i < Math.min(lines.length, 8); i++) {
    const line = lines[i];
    if (excludeRe.test(line) || bracketTagRe.test(line.replace(/\s+/g, ''))) continue;
    const letters = (line.match(/[가-힣a-zA-Z]/g) || []).length;
    const digits = (line.match(/[0-9]/g) || []).length;
    if (letters >= 2 && letters > digits && line.length <= 25) return line;
  }
  return '';
}

function onOcrResult(result) {
  document.getElementById('vendor').value = result.vendor || '';
  document.getElementById('amount').value = result.amount || '';
  document.getElementById('usedDate').value = result.date || '';
  document.getElementById('editForm').style.display = 'block';
  setStatus('인식 완료! 내용을 확인하고 저장해 주세요.');
}

function saveReceipt() {
  const name = document.getElementById('submitterName').value.trim();
  if (!name) { setStatus('먼저 이름을 입력하고 저장해 주세요.'); return; }
  const team = getTeamValue();
  if (!team) { setStatus('사역팀명을 입력해 주세요.'); return; }
  const vendor = document.getElementById('vendor').value.trim();
  const amount = Number(document.getElementById('amount').value);
  const usedDate = document.getElementById('usedDate').value;
  const purchaseDetail = document.getElementById('purchaseDetail').value.trim();
  const memo = document.getElementById('memo').value.trim();
  if (!amount) { setStatus('금액을 입력해 주세요.'); return; }
  if (!purchaseDetail) { setStatus('구매내역을 입력해 주세요.'); return; }

  document.getElementById('saveBtn').disabled = true;
  setStatus('저장 중입니다...');

  callApi('saveReceipt', {
    submitter: name, team: team, vendor: vendor, amount: amount,
    usedDate: usedDate, purchaseDetail: purchaseDetail, memo: memo,
    imageBase64: currentBase64, mimeType: currentMime
  })
    .then(function() {
      setStatus('저장되었습니다!');
      document.getElementById('editForm').style.display = 'none';
      document.getElementById('preview').style.display = 'none';
      document.getElementById('fileInput').value = '';
      currentBase64 = null;
      loadList();
      document.getElementById('saveBtn').disabled = false;
    })
    .catch(function(err) {
      setStatus('저장 실패: ' + err.message);
      document.getElementById('saveBtn').disabled = false;
    });
}

function loadList() {
  const name = document.getElementById('submitterName').value.trim();
  if (!name) return;
  callApi('getMyReceipts', { submitter: name })
    .then(renderList)
    .catch(function(err) { setStatus('목록 조회 실패: ' + err.message); });
}

function renderList(items) {
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';
  let total = 0;
  items.forEach(function(it) {
    total += Number(it.amount) || 0;
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML =
      '<img src="' + (it.imageUrl || '') + '">' +
      '<div class="info"><div class="vendor">' + (it.vendor || '(상호명 없음)') +
      (it.team ? ' · ' + it.team : '') + '</div>' +
      '<div class="meta">' + (it.purchaseDetail || '') + '</div>' +
      '<div class="meta">' + (it.usedDate || '') + (it.memo ? ' · ' + it.memo : '') + '</div></div>' +
      '<div class="amt">' + Number(it.amount).toLocaleString() + '원</div>' +
      '<button class="del" onclick="deleteReceipt(\'' + it.rowId + '\')">삭제</button>';
    listEl.appendChild(div);
  });
  document.getElementById('totalAmt').textContent = total.toLocaleString() + '원';
}

function deleteReceipt(rowId) {
  if (!confirm('이 항목을 삭제할까요?')) return;
  callApi('deleteReceipt', { rowId: rowId }).then(loadList).catch(function(err) {
    setStatus('삭제 실패: ' + err.message);
  });
}

window.onload = function() {
  loadName();
  loadList();
};
</script>
</body>
</html>
